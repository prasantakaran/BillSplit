org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation breaks when the pub cache (C:) and the
# project (D:) are on different drives ("this and base files have different
# roots"), corrupting plugin build caches. Disable it for reliable builds.
kotlin.incremental=false
